<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
  </head>
  <body>
    <table>
      <tr>
        <th colspan="3">Practical Table</th>
      </tr>
      <tr>
        <td>first</td>
        <td>second</td>
        <td>third</td>
      </tr>
      <tr>
        <td>fourth</td>
        <td>fifth</td>
        <td>sixth</td>
      </tr>
      <tr>
        <td>seventh</td>
        <td>eighth</td>
        <td>ninth</td>
      </tr>
      <tr>
        <td colspan="3" rowspan="2">tenth</td>
      </tr>
      <tr></tr>
      <tr>
        <td></td>
      </tr>
    </table>
  </body>
  <style>
    table {
      border: 1px solid black;
    }
    tr {
      border: 1px solid black;
    }
    td {
      border: 1px solid black;
      text-align: center;
    }
    th {
      border: 1px solid black;
      text-align: center;
    }
  </style>
</html>
